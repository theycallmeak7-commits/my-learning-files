<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Portal</title>
    <style>
        :root {
            --primary-glow: rgba(180, 100, 255, 0.2);
            --secondary-glow: rgba(100, 200, 255, 0.2);
            --text-light: #f0f0f0;
            --text-dark: #1a1a2e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: 16px;
            --shadow-glow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(180, 100, 255, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 50%, rgba(100, 200, 255, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse 50% 40% at 20% 80%, rgba(180, 100, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 40% 30% at 50% 100%, rgba(100, 200, 255, 0.15) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 1rem;
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            background: linear-gradient(135deg, #e0e0ff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 10px var(--primary-glow);
        }

        header p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
        }

        /* Courses Section */
        .courses-section {
            margin-bottom: 2rem;
        }

        .courses-section h2 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-light);
            text-align: center;
            position: relative;
            display: inline-block;
        }

        .courses-section h2::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #a0a0ff, transparent);
            border-radius: 3px;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
        }

        /* Course Card */
        .course-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-glow);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(180, 100, 255, 0.05) 0%, rgba(100, 200, 255, 0.05) 100%);
            border-radius: 20px;
            opacity: 0.5;
            z-index: 0;
        }

        .course-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .course-card > * {
            position: relative;
            z-index: 1;
        }

        .course-card h3 {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            font-weight: 600;
            margin-bottom: 1.2rem;
            color: var(--text-light);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .course-actions {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-kimi {
            border-color: rgba(180, 100, 255, 0.4);
            box-shadow: 0 0 15px rgba(180, 100, 255, 0.1);
        }

        .btn-kimi:hover {
            background: rgba(180, 100, 255, 0.15);
            border-color: rgba(180, 100, 255, 0.6);
            box-shadow: 0 0 20px rgba(180, 100, 255, 0.2);
        }

        .btn-mistral {
            border-color: rgba(100, 200, 255, 0.4);
            box-shadow: 0 0 15px rgba(100, 200, 255, 0.1);
        }

        .btn-mistral:hover {
            background: rgba(100, 200, 255, 0.15);
            border-color: rgba(100, 200, 255, 0.6);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.2);
        }

        /* Responsive */
        @media (min-width: 768px) {
            .course-actions {
                flex-direction: row;
            }
            .btn {
                flex: 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Learning Portal</h1>
            <p>Adeel Khan's Personal Learning Hub</p>
        </header>

        <main>
            <section class="courses-section">
                <h2>Active Courses</h2>
                <div class="courses-grid">
                    <!-- Python Coding Practice with AI -->
                    <article class="course-card">
                        <h3>Python Coding Practice with AI</h3>
                        <div class="course-actions">
                            <a href="./courses/python-coding-practice-with-ai/kimi/index.html" class="btn btn-kimi">Kimi Version</a>
                            <a href="./courses/python-coding-practice-with-ai/mistral/index.html" class="btn btn-mistral">Mistral Version</a>
                            <a href="./courses/python-coding-practice-with-ai/deepseek/index.html" class="btn btn-mistral">deepseek Version</a>


                        </div>
                    </article>


                       <article class="course-card">
                        <h3>Prompteng</h3>
                        <div class="course-actions">
                            <a href="./courses/prompteng/mistral/index.html" class="btn btn-mistral">Mistral Version</a>


                        </div>
                    </article>

                    <!-- Learning to Learn -->
                    <article class="course-card">
                        <h3>Learning to Learn</h3>
                        <div class="course-actions">
                            <a href="./courses/learning-to-learn/kimi/index.html" class="btn btn-kimi">Kimi Version</a>
                            <a href="./courses/learning-to-learn/mistral/index.html" class="btn btn-mistral">Mistral Version</a>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
